name: Tests with UV

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up UV
      uses: astral-sh/setup-uv@v5
      with:
        version: latest
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: uv sync
    
    - name: Lint and Format with Ruff
      run: |
        uv run ruff check src/cript tests
        uv run ruff format --check src/cript tests
      continue-on-error: true
    
    - name: Type check with mypy
      run: uv run mypy src/cript --ignore-missing-imports
      continue-on-error: true
    
    - name: Run tests with pytest
      run: uv run pytest tests/ -v --cov=src/cript --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
      continue-on-error: true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up UV
      uses: astral-sh/setup-uv@v5
      with:
        version: latest
    
    - name: Run Bandit security check
      # uvx ejecuta la herramienta de forma temporal sin ensuciar el entorno virtual
      run: uvx bandit -r src/cript -ll
      continue-on-error: true
    
    - name: Check for known vulnerabilities
      run: uvx pip-audit
      continue-on-error: true